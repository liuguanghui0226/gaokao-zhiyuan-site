<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>全国高考志愿填报</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">志</div>
          <div>
            <h1>全国高考志愿填报</h1>
            <p id="generatedAt">正在载入资料</p>
          </div>
        </div>
        <nav class="nav" aria-label="主导航">
          <button class="nav-btn active" data-view="overview">总览</button>
          <button class="nav-btn" data-view="recommend">院校专业推荐</button>
          <button class="nav-btn" data-view="disciplines">专业门类</button>
          <button class="nav-btn" data-view="rules">规则与风险</button>
          <button class="nav-btn" data-view="sources">数据来源</button>
        </nav>
        <div class="sidebar-note">
          <strong>31省数据</strong>
          <span>按省加载</span>
        </div>
      </aside>

      <main class="main">
        <section class="toolbar" aria-label="检索和筛选">
          <label class="search-box">
            <span>检索</span>
            <input id="searchInput" type="search" placeholder="专业、院校、平行志愿、07理学..." />
          </label>
          <label class="select-box">
            <span>门类</span>
            <select id="disciplineFilter">
              <option value="">全部门类</option>
            </select>
          </label>
          <label class="select-box">
            <span>主题</span>
            <select id="domainFilter">
              <option value="">全部主题</option>
            </select>
          </label>
        </section>

        <section id="view-overview" class="view active-view"></section>
        <section id="view-recommend" class="view"></section>
        <section id="view-disciplines" class="view"></section>
        <section id="view-rules" class="view"></section>
        <section id="view-sources" class="view"></section>
      </main>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">
        <h2>没有匹配结果</h2>
        <p>清空筛选后重试</p>
      </div>
    </template>

    <script>
      window.__GAOKAO_RUNTIME_RELEASE_BASE__ = "./data/release-v3.275";
    </script>
    <script type="module" src="./assets/app.js?v=3.317.0"></script>
  </body>
</html>
