          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-jxust-national-2023-2025-school-major-admission" and .parsedRecords == 2905 and .nativeAdmissionRankRecords == 2704 and .derivedRankRecords == 0 and .rankUnavailableRecords == 201 and .ordinaryRecords == 2596 and .specialPathRecords == 309 and .provinceCount == 31 and (.evidenceBoundary | contains("school-recorded min-score rank")) and (.evidenceBoundary | contains("not province-wide closure")))] | length == 1' >/dev/null
