name: Verify live nationwide site

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published UI and all province shards
        shell: bash
        run: |
          set -euo pipefail

          base="https://liuguanghui0226.github.io/gaokao-zhiyuan-site/"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          fetch() {
            curl --fail --silent --show-error --location \
              --retry 12 --retry-all-errors --retry-delay 5 \
              "$1" -o "$2"
          }

          fetch "$base" "$work/index.html"
          grep -q "全国高考志愿填报" "$work/index.html"
          grep -q "__GAOKAO_RUNTIME_RELEASE_BASE__" "$work/index.html"
          grep -q 'app.js?v=3.320.0' "$work/index.html"

          release_path="$(node -e '
            const html = require("node:fs").readFileSync(process.argv[1], "utf8");
            const match = html.match(/__GAOKAO_RUNTIME_RELEASE_BASE__\s*=\s*"\.\/data\/([^"]+)/);
            if (!match) process.exit(1);
            process.stdout.write(match[1]);
          ' "$work/index.html")"

          fetch "${base}assets/app.js" "$work/app.js"
          grep -q "buildApplicationPlan" "$work/app.js"
          grep -q "electiveRequirement" "$work/app.js"
          grep -q "vocationalScoreInput" "$work/app.js"
          grep -q "controlLineScoreComparison" "$work/app.js"
          grep -q "pendingOrdinaryVocationalControlSource" "$work/app.js"
          grep -q "pendingOrdinaryVocationalReviewDetails" "$work/app.js"
          grep -q "不使用往年控制线" "$work/app.js"
          grep -q "limitedOrdinaryVocationalControlLine" "$work/app.js"
          grep -q "限定院校资格核验清单" "$work/app.js"
          grep -q "2026年普通专科控制线待发布" "$work/app.js"
          grep -q '招生数${record.admittedCount}' "$work/app.js"
          grep -q 'schoolTags.slice(0, 24)' "$work/app.js"
          grep -q '推荐时按省份加载' "$work/app.js"
          grep -q 'DISCIPLINE_MAJOR_CATALOG' "$work/app.js"
          grep -q 'data-discipline-code' "$work/app.js"
          grep -q 'id="disciplineRecommend"' "$work/app.js"
          grep -q 'sectionHead("院校专业推荐")' "$work/app.js"
          grep -q 'fetchRuntimeJson("knowledge-core-lite.json", "核心知识")' "$work/app.js"
          grep -q 'renderView(state.view, { force: true })' "$work/app.js"
          grep -q '基本情况：${profile.childType}；当前策略：${profile.strategy}' "$work/app.js"
          grep -q '<h4>院校建议</h4>' "$work/app.js"
          grep -q 'name: "院校专业排序规则"' "$work/app.js"
          grep -q 'item.id === "five-axis" ? "五项排序依据"' "$work/app.js"
          grep -q 'id="guangxiLocalScoreInput"' "$work/app.js"
          grep -q 'id="guangxiLocalRankInput"' "$work/app.js"
          grep -q 'estimateRankFromScore(profile, "outside-guangxi")' "$work/app.js"
          grep -q 'estimateRankFromScore(profile, "inside-guangxi")' "$work/app.js"
          ! grep -q '孩子画像为' "$work/app.js"
          ! grep -q '模型建议院校' "$work/app.js"
          ! grep -q '<small>${fmtNumber(matched.length)} 条资料</small>' "$work/app.js"
          fetch "${base}assets/styles.css" "$work/styles.css"
          ! grep -Eq 'font-size:[[:space:]]*([0-9]|1[0-3])px' "$work/styles.css"
          grep -q 'data-view="sources">数据来源' "$work/index.html"
          ! grep -q 'data-view="rounds"' "$work/index.html"
          ! grep -q 'data-view="audio"' "$work/index.html"

          fetch "${base}data/${release_path}/manifest.json.gz" "$work/manifest.json.gz"
          gzip -t "$work/manifest.json.gz"
          gzip -dc "$work/manifest.json.gz" > "$work/manifest.json"
          jq -e '.provinceCount == 31' "$work/manifest.json" >/dev/null
          jq -e '.recordCount == 868426' "$work/manifest.json" >/dev/null
          jq -e '.rankConversionCount == 126945' "$work/manifest.json" >/dev/null
          jq -e '(.shards | length) == 31' "$work/manifest.json" >/dev/null
          jq -e '.runtimeProfile.version == "v3.323" and .runtimeProfile.initialCore == "knowledge-core-lite.json.gz" and .runtimeProfile.fullEvidenceCore == "knowledge-core.json.gz"' "$work/manifest.json" >/dev/null
          jq -e '.coreLite.profile == "core-lite-v1" and .coreLite.sourceNotes == 5127 and .coreLite.compressedBytes > 0' "$work/manifest.json" >/dev/null

          fetch "${base}data/${release_path}/knowledge-core-lite.json.gz" "$work/knowledge-core-lite.json.gz"
          gzip -t "$work/knowledge-core-lite.json.gz"
          gzip -dc "$work/knowledge-core-lite.json.gz" > "$work/knowledge-core-lite.json"
          jq -e '.modelVersion == "local-deterministic-v3.323-fujian-official-rank2025-published-floor-aligned-868426records"' "$work/knowledge-core-lite.json" >/dev/null
          jq -e '.browserRuntime.profile == "core-lite-v1" and .admissionScoreLayer.structuredRecords == 868426 and .admissionScoreLayer.rankConversionRecords == 126945 and (.admissionScoreLayer.sourceNotes | length) == 5127' "$work/knowledge-core-lite.json" >/dev/null
          jq -e '[.admissionScoreLayer.sourceNotes[] | select(.ordinaryVocationalStatus == "pending-official-release" and .ordinaryVocationalReview.noHistoricalSubstitution == true)] | length == 5' "$work/knowledge-core-lite.json" >/dev/null
          test "$(wc -c < "$work/knowledge-core-lite.json" | tr -d ' ')" -eq "$(jq -r '.coreLite.bytes' "$work/manifest.json")"
          test "$(shasum -a 256 "$work/knowledge-core-lite.json" | awk '{print $1}')" = "$(jq -r '.coreLite.sha256' "$work/manifest.json")"

          fetch "${base}data/${release_path}/knowledge-core.json.gz" "$work/knowledge-core.json.gz"
          gzip -t "$work/knowledge-core.json.gz"
          gzip -dc "$work/knowledge-core.json.gz" > "$work/knowledge-core.json"
          test $(( $(wc -c < "$work/knowledge-core-lite.json") * 4 )) -le "$(wc -c < "$work/knowledge-core.json")"
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '.modelVersion == "local-deterministic-v3.323-fujian-official-rank2025-published-floor-aligned-868426records"' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '.admissionScoreLayer.structuredRecords == 868426 and .admissionScoreLayer.rankConversionRecords == 126945 and (.admissionScoreLayer.sourceNotes | length) == 5127 and .admissionScoreLayer.rankSourceCoverage.sources == 213 and .admissionScoreLayer.rankSourceCoverage.parsedSources == 147 and .admissionScoreLayer.rankSourceCoverage.parsedRecords == 126945' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-xinjiang-undergraduate1-filing-2025-v3311" and .parsedRecords == 505 and .imageCount == 3 and (.rawFiles | length) == 21 and .rankUnavailableRecords == 505 and .scoreDerivedRankRecords == 0 and (.evidenceBoundary | contains("no major result, minimum rank")))] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-xinjiang-undergraduate2-filing-2025-v3312" and .parsedRecords == 1076 and .imageCount == 7 and (.rawFiles | length) == 249 and .rankUnavailableRecords == 1076 and .scoreDerivedRankRecords == 0 and .filingScoreRecords == 1060 and .noFilingPlanRecords == 16 and (.evidenceBoundary | contains("no major result, minimum rank")))] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
