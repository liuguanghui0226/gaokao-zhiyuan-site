name: Verify live nationwide site

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published UI and all province shards
        shell: bash
        run: |
          set -euo pipefail

          base="https://liuguanghui0226.github.io/gaokao-zhiyuan-site/"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          fetch() {
            curl --fail --silent --show-error --location \
              --retry 12 --retry-all-errors --retry-delay 5 \
              "$1" -o "$2"
          }

          fetch "$base" "$work/index.html"
          grep -q "全国高考志愿智能推荐" "$work/index.html"
          grep -q "__GAOKAO_RUNTIME_RELEASE_BASE__" "$work/index.html"

          release_path="$(node -e '
            const html = require("node:fs").readFileSync(process.argv[1], "utf8");
            const match = html.match(/__GAOKAO_RUNTIME_RELEASE_BASE__\s*=\s*"\.\/data\/([^"]+)/);
            if (!match) process.exit(1);
            process.stdout.write(match[1]);
          ' "$work/index.html")"

          fetch "${base}assets/app.js" "$work/app.js"
          grep -q "buildApplicationPlan" "$work/app.js"
          grep -q "electiveRequirement" "$work/app.js"
          grep -q "vocationalScoreInput" "$work/app.js"
          grep -q "controlLineScoreComparison" "$work/app.js"
          grep -q "pendingOrdinaryVocationalControlSource" "$work/app.js"
          grep -q "2026年普通专科控制线待发布" "$work/app.js"

          fetch "${base}data/${release_path}/manifest.json.gz" "$work/manifest.json.gz"
          gzip -t "$work/manifest.json.gz"
          gzip -dc "$work/manifest.json.gz" > "$work/manifest.json"
          jq -e '.provinceCount == 31' "$work/manifest.json" >/dev/null
          jq -e '.recordCount == 846746' "$work/manifest.json" >/dev/null
          jq -e '.rankConversionCount == 116656' "$work/manifest.json" >/dev/null
          jq -e '(.shards | length) == 31' "$work/manifest.json" >/dev/null

          fetch "${base}data/${release_path}/knowledge-core.json.gz" "$work/knowledge-core.json.gz"
          gzip -t "$work/knowledge-core.json.gz"
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '.modelVersion == "local-deterministic-v3.288-neimenggu-control-lines2026-and-rank-provenance-846746records"' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-tianjin-control-lines-2026" and .ordinaryVocationalStatus == "pending-official-release")] | length == 1' >/dev/null

          shard_count=0
          while IFS= read -r file; do
            output="$work/${file}.gz"
            fetch "${base}data/${release_path}/${file}.gz" "$output"
            gzip -t "$output"
            shard_count=$((shard_count + 1))
          done < <(jq -r '.shards[].file' "$work/manifest.json")

          test "$shard_count" -eq 31
          gzip -dc "$work/jiangxi.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-jiangxi-control-lines-2026")] | length == 30' >/dev/null
          gzip -dc "$work/jiangxi.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-jiangxi-control-lines-2026" and .majorGroup == "普通类" and .controlLineSection == "本科") | .minScore] | sort == [412, 479]' >/dev/null
          gzip -dc "$work/xizang.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-xizang-control-lines-2026")] | length == 22' >/dev/null
          gzip -dc "$work/xizang.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-xizang-control-lines-2026" and .formalScoreScope == "control-line-only")] | length == 12' >/dev/null
          gzip -dc "$work/xizang.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-xizang-control-lines-2026" and .formalScoreScope == "special-path-only")] | length == 10' >/dev/null
          gzip -dc "$work/zhejiang.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-zhejiang-control-lines-2026")] | length == 57' >/dev/null
          gzip -dc "$work/zhejiang.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-zhejiang-control-lines-2026" and .controlLineRouteKind == "segment") | .minScore] | sort == [266, 494]' >/dev/null
          gzip -dc "$work/zhejiang.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-zhejiang-control-lines-2026" and .formalScoreScope == "special-path-only")] | length == 55' >/dev/null
          gzip -dc "$work/hunan.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-hunan-control-lines-2026")] | length == 37' >/dev/null
          gzip -dc "$work/hunan.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-hunan-control-lines-2026" and .formalScoreScope == "control-line-only")] | length == 4' >/dev/null
          gzip -dc "$work/hunan.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-hunan-control-lines-2026" and .formalScoreScope == "special-path-only")] | length == 33' >/dev/null
          gzip -dc "$work/hunan.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-hunan-control-lines-2026" and .controlLineRouteKind == "ordinary-bachelor") | .minScore] | sort == [400, 446]' >/dev/null
          gzip -dc "$work/hunan.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-hunan-control-lines-2026" and .controlLineRouteKind == "ordinary-vocational") | .minScore] | sort == [200, 200]' >/dev/null
          gzip -dc "$work/guangdong.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-guangdong-control-lines-2026")] | length == 49' >/dev/null
          gzip -dc "$work/guangdong.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-guangdong-control-lines-2026" and .formalScoreScope == "control-line-only")] | length == 4' >/dev/null
          gzip -dc "$work/guangdong.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-guangdong-control-lines-2026" and .formalScoreScope == "special-path-only")] | length == 45' >/dev/null
          gzip -dc "$work/guangdong.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-guangdong-control-lines-2026" and .controlLineRouteKind == "ordinary-bachelor") | .minScore] | sort == [425, 440]' >/dev/null
          gzip -dc "$work/guangdong.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-guangdong-control-lines-2026" and .controlLineRouteKind == "ordinary-vocational") | .minScore] | sort == [200, 200]' >/dev/null
          gzip -dc "$work/guangdong.json.gz" \
            | jq -e '[.rankConversions[] | select(.year == 2026 and (.sourceId == "official-guangdong-rank-2026" or .sourceId == "official-guangdong-special-rank-2026") and .sourceUrl == "https://eea.gd.gov.cn/ptgk/content/post_4916165.html")] | length == 8816' >/dev/null
          gzip -dc "$work/anhui.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-anhui-control-lines-2026")] | length == 52' >/dev/null
          gzip -dc "$work/anhui.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-anhui-control-lines-2026" and .formalScoreScope == "control-line-only")] | length == 4' >/dev/null
          gzip -dc "$work/anhui.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-anhui-control-lines-2026" and .formalScoreScope == "special-path-only")] | length == 48' >/dev/null
          gzip -dc "$work/anhui.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-anhui-control-lines-2026" and .controlLineRouteKind == "ordinary-bachelor") | .minScore] | sort == [451, 490]' >/dev/null
          gzip -dc "$work/anhui.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-anhui-control-lines-2026" and .controlLineRouteKind == "ordinary-vocational") | .minScore] | sort == [200, 200]' >/dev/null
          gzip -dc "$work/anhui.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-anhui-control-lines-2026" and (.professionalMinScore | type) == "number")] | length == 40' >/dev/null
          gzip -dc "$work/anhui.json.gz" \
            | jq -e '[.rankConversions[] | select(.year == 2026 and .sourceId == "official-anhui-rank-2026" and .sourceUrl == "https://gaokao.chsi.com.cn/gkxx/zc/ss/202606/20260625/2293847718.html")] | length == 976' >/dev/null
          gzip -dc "$work/beijing.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-beijing-control-lines-2026")] | length == 9' >/dev/null
          gzip -dc "$work/beijing.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-beijing-control-lines-2026" and .formalScoreScope == "control-line-only")] | length == 2' >/dev/null
          gzip -dc "$work/beijing.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-beijing-control-lines-2026" and .formalScoreScope == "special-path-only")] | length == 7' >/dev/null
          gzip -dc "$work/beijing.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-beijing-control-lines-2026" and .controlLineRouteKind == "ordinary-bachelor" and .minScore == 429 and .scoreBasis == "gaokao-total")] | length == 1' >/dev/null
          gzip -dc "$work/beijing.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-beijing-control-lines-2026" and .controlLineRouteKind == "ordinary-vocational" and .minScore == 120 and .scoreBasis == "chinese-math-foreign-450")] | length == 1' >/dev/null
          gzip -dc "$work/beijing.json.gz" \
            | jq -e '[.rankConversions[] | select(.year == 2026 and .sourceId == "official-beijing-rank-2026" and .sourceUrl == "https://www.bjeea.cn/html/gkgz/tzgg/2026/0624/88238.html")] | length == 341' >/dev/null
          gzip -dc "$work/tianjin.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-tianjin-control-lines-2026")] | length == 6' >/dev/null
          gzip -dc "$work/tianjin.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-tianjin-control-lines-2026" and .formalScoreScope == "control-line-only")] | length == 1' >/dev/null
          gzip -dc "$work/tianjin.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-tianjin-control-lines-2026" and .formalScoreScope == "special-path-only")] | length == 5' >/dev/null
          gzip -dc "$work/tianjin.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-tianjin-control-lines-2026" and .controlLineRouteKind == "ordinary-bachelor" and .minScore == 458 and .scoreBasis == "gaokao-total")] | length == 1' >/dev/null
          gzip -dc "$work/tianjin.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-tianjin-control-lines-2026" and .controlLineRouteKind == "ordinary-vocational")] | length == 0' >/dev/null
          gzip -dc "$work/tianjin.json.gz" \
            | jq -e '[.rankConversions[] | select(.year == 2026 and .sourceId == "official-tianjin-rank-2026" and .sourceUrl == "https://gaokao.chsi.com.cn/gkxx/zc/ss/202606/20260624/2293845980.html")] | length == 381' >/dev/null
          gzip -dc "$work/inner-mongolia.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-neimenggu-control-lines-2026")] | length == 74' >/dev/null
          gzip -dc "$work/inner-mongolia.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-neimenggu-control-lines-2026" and .formalScoreScope == "control-line-only")] | length == 4' >/dev/null
          gzip -dc "$work/inner-mongolia.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-neimenggu-control-lines-2026" and .formalScoreScope == "special-path-only")] | length == 70' >/dev/null
          gzip -dc "$work/inner-mongolia.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-neimenggu-control-lines-2026" and .controlLineRouteKind == "ordinary-bachelor") | [.subjectType, .minScore]] | sort == [["历史类", 403], ["物理类", 363]]' >/dev/null
          gzip -dc "$work/inner-mongolia.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-neimenggu-control-lines-2026" and .controlLineRouteKind == "ordinary-vocational") | [.subjectType, .minScore]] | sort == [["历史类", 160], ["物理类", 160]]' >/dev/null
          gzip -dc "$work/inner-mongolia.json.gz" \
            | jq -e '[.records[] | select(.sourceId == "official-neimenggu-control-lines-2026" and (.professionalMinScore | type) == "number")] | length == 36' >/dev/null
          gzip -dc "$work/inner-mongolia.json.gz" \
            | jq -e '[.rankConversions[] | select(.year == 2026 and .sourceId == "official-neimenggu-rank-2026" and .subjectType == "历史类" and .sourceUrl == "https://www.nm.zsks.cn/fzlm/26gktj/202606/t20260624_46464.html")] | length == 471' >/dev/null
          gzip -dc "$work/inner-mongolia.json.gz" \
            | jq -e '[.rankConversions[] | select(.year == 2026 and .sourceId == "official-neimenggu-rank-2026" and .subjectType == "物理类" and .sourceUrl == "https://www.nm.zsks.cn/fzlm/26gktj/202606/t20260624_46462.html")] | length == 503' >/dev/null
          printf 'verified_url=%s\n' "$base"
          printf 'release_path=%s\n' "$release_path"
          printf 'province_shards=%s\n' "$shard_count"
