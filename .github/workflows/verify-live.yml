name: Verify live nationwide site

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published UI and all province shards
        shell: bash
        run: |
          set -euo pipefail

          base="https://liuguanghui0226.github.io/gaokao-zhiyuan-site/"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          fetch() {
            curl --fail --silent --show-error --location \
              --retry 12 --retry-all-errors --retry-delay 5 \
              "$1" -o "$2"
          }

          fetch "$base" "$work/index.html"
          grep -q "全国高考志愿智能推荐" "$work/index.html"
          grep -q "__GAOKAO_RUNTIME_RELEASE_BASE__" "$work/index.html"
          grep -q 'app.js?v=3.298.0' "$work/index.html"

          release_path="$(node -e '
            const html = require("node:fs").readFileSync(process.argv[1], "utf8");
            const match = html.match(/__GAOKAO_RUNTIME_RELEASE_BASE__\s*=\s*"\.\/data\/([^"]+)/);
            if (!match) process.exit(1);
            process.stdout.write(match[1]);
          ' "$work/index.html")"

          fetch "${base}assets/app.js" "$work/app.js"
          grep -q "buildApplicationPlan" "$work/app.js"
          grep -q "electiveRequirement" "$work/app.js"
          grep -q "vocationalScoreInput" "$work/app.js"
          grep -q "controlLineScoreComparison" "$work/app.js"
          grep -q "pendingOrdinaryVocationalControlSource" "$work/app.js"
          grep -q "limitedOrdinaryVocationalControlLine" "$work/app.js"
          grep -q "限定院校资格核验清单" "$work/app.js"
          grep -q "2026年普通专科控制线待发布" "$work/app.js"

          fetch "${base}data/${release_path}/manifest.json.gz" "$work/manifest.json.gz"
          gzip -t "$work/manifest.json.gz"
          gzip -dc "$work/manifest.json.gz" > "$work/manifest.json"
          jq -e '.provinceCount == 31' "$work/manifest.json" >/dev/null
          jq -e '.recordCount == 847051' "$work/manifest.json" >/dev/null
          jq -e '.rankConversionCount == 116656' "$work/manifest.json" >/dev/null
          jq -e '(.shards | length) == 31' "$work/manifest.json" >/dev/null

          fetch "${base}data/${release_path}/knowledge-core.json.gz" "$work/knowledge-core.json.gz"
          gzip -t "$work/knowledge-core.json.gz"
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '.modelVersion == "local-deterministic-v3.298-heilongjiang-control-lines2026-and-rank-provenance-847051records"' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-tianjin-control-lines-2026" and .ordinaryVocationalStatus == "pending-official-release")] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-shanghai-control-lines-2026" and .ordinaryVocationalStatus == "pending-official-release" and .ordinaryVocationalExpectedPublicationAt == "2026-07-29")] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "gk100-gansu-rank-2026" and (.quality | startswith("third-party-")) and .provenanceRevision.officialRankPageFound == false and .provenanceRevision.rankRowsCrossChecked == 1343 and .provenanceRevision.valueChanges == 0)] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-guangxi-control-lines-2026" and .quality == "official-content-mirror-guangxi-control-line-image-and-chinanews-text-verified" and .directPageRedownloadStatus == "blocked-current-session-tls" and .parsedRecords == 50)] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-guangxi-rank-2026" and .provenanceRevision.rankRowsLinked == 1012 and .provenanceRevision.valueChanges == 0)] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-guizhou-control-lines-2026" and .quality == "official-content-mirror-guizhou-chsi-government-image-and-chinanews-verified" and .originalWechatRetrievalStatus == "blocked-by-environment-verification" and .parsedRecords == 29 and .evidence.tongrenGovernmentImage.sha256 == "803941857c6ba11d75791d157f1710d2b7d5855791ed188b86b79970dfad339f")] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-guizhou-rank-2026" and .provenanceRevision.rankRowsLinked == 1201 and .provenanceRevision.valueChanges == 0 and .provenanceRevision.identicalMirrorHashes.history == "0b8cf4360336c19442eab70355617624ca87d9f4f40a65b99346ff8fb798d183" and .provenanceRevision.identicalMirrorHashes.physics == "361ae84119880307acff21018f96cd06d1c530859bf4ad6fee41f1e07099f9c4")] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-hainan-control-lines-2026" and .quality == "official-content-mirror-hainan-chsi-official-image-and-hainan-daily-text-verified" and .ordinaryVocationalStatus == "pending-official-release" and .scoreMaximum == 900 and .parsedRecords == 14 and .evidence.chsiControlImage.sha256 == "55be6fdf1034569e3961b5d7ec1573ae5b7a79a96280825977ad2be6c20db5eb")] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-hainan-rank-2026" and .provenanceRevision.rankRowsLinked == 547 and .provenanceRevision.rowsFullCrossChecked == 547 and .provenanceRevision.valueChanges == 0 and .provenanceRevision.chsiMirrorPdf.sha256 == "9ee71c71ebd8c6a1641b2465fd5eff21707a9fd42306d04b219ea2aa8bca062c")] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-heilongjiang-control-lines-2026" and .quality == "official-heilongjiang-government-control-lines-html" and .parsedRecords == 18 and .scoreMaximum == 750 and .evidence.controlPage.sha256 == "26ff5c8469380e854a5346b4b0ec262823daee4a30051872fa08af376b921159")] | length == 1' >/dev/null
          gzip -dc "$work/knowledge-core.json.gz" \
            | jq -e '[.admissionScoreLayer.sourceNotes[] | select(.id == "official-heilongjiang-rank-2026" and .provenanceRevision.rankRowsLinked == 1071 and .provenanceRevision.rowsFullCrossChecked == 1071 and .provenanceRevision.valueChanges == 0 and .provenanceRevision.directOfficialRedownloadStatus == "success" and .provenanceRevision.officialFiles.history.sha256 == "e7beb16f3d3a925ad2fbe6fcc83d35bce16a216bda394e22e37052bbb2f00bcd" and .provenanceRevision.officialFiles.physics.sha256 == "9e70a27172d6c1a4ebe1b57386d14feaa13e71b5bab03c6a798aaadda53007e0")] | length == 1' >/dev/null

          shard_count=0
          while IFS= read -r file; do
            output="$work/${file}.gz"
            fetch "${base}data/${release_path}/${file}.gz" "$output"
            gzip -t "$output"
            shard_count=$((shard_count + 1))
          done < <(jq -r '.shards[].file' "$work/manifest.json")

