  - "第一阶段只公布到历史类482分、物理类463分；更低分数保持缺位次。"
  - "第二阶段表是剩余符合填报条件考生统计，不能与第一阶段全体累计位次拼接。"
  - "艺体综合分、特殊招生路径、科类不明和小数分不连接普通位次。"
