residual_risks:
  - "8222条记录中668条最低分来源质量仍为待复核第三方，位次补全不会提升原最低分来源等级。"
  - "换算位次来自同年省级成绩统计表，不是院校投档或录取原表直接公布的原生最低位次。"
  - "表中人数、累计人数和名次不包含已确定录取的考生。"
  - "最高分未逐分公开部分只保留合并档，不推测单个高分考生位次。"
  - "艺体综合分、特殊招生路径、科类不明和小数分不连接普通位次。"
