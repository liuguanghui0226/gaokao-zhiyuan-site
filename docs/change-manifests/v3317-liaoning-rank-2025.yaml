residual_risks:
  - "考试院原始附件在当前会话TLS不可用；来源可靠性依赖省教育厅归属说明、阳光高考保存的招考办PDF和两科完整表逐项一致。"
  - "21701条记录中941条最低分来源质量仍为待复核第三方，位次补全不会提升原最低分来源等级。"
  - "换算位次来自同年省级成绩统计表，不是院校投档或录取原表直接公布的原生最低位次。"
  - "统计表包含同科类普通、艺术和体育考生，只用于文化分换算；艺体综合分、特殊招生路径、科类不明和小数分不连接普通位次。"
  - "五个零人数分数缺口和最高分合并档只能保存缺口或区间，不能生成伪精确名次。"
  - "正式填报仍需核验当年招生计划、专业选科要求、院校招生章程和省考试院最新公告。"
